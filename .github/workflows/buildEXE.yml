name: Build Windows App with Nuitka

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.13.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.9'
          # 快取 pip 依賴可以加速後續編譯
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka zstandard pyside6
          # 如果你的程式有其他依賴，請在此安裝
          # pip install -r requirements.txt

      - name: Build EXE with Nuitka
        shell: cmd
        run: call build.cmd

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-folder
          path: dist/main.dist/  # 上傳整個編譯後的資料夾
